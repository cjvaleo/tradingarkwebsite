  <style>
    /* ============================================================
       BRAND TOKENS — locked, do not improvise
       ============================================================ */
    :root {
      /* DUSK PALETTE */
      --night:    #0A0806;  /* primary surface */
      --night-2:  #14110D;  /* card surface */
      --night-3:  #1C1812;  /* elevated */
      --carbon:   #2A241C;  /* borders */

      /* CREAM (text on dark) */
      --cream:    #EDE6D6;  /* primary text */
      --cream-2:  #C9C0AB;  /* secondary */
      --cream-3:  #8A8068;  /* tertiary */
      --cream-4:  #5A523F;  /* quiet */

      /* GOLD (exact palette — do not adjust) */
      --g-ae:     #AE8625;
      --g-d2:     #D2AC47;
      --g-ed:     #EDC967;
      --g-f7:     #F7EF8A;
      --g-92:     #926F34;

      /* SEMANTIC */
      --profit:   #7A9E5E;
      --loss:     #B5564A;

      /* TYPOGRAPHY */
      --font-display: 'Fraunces', serif;
      --font-sans:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      /* LAYOUT */
      --container: 1200px;
      --gutter:    clamp(1rem, 4vw, 2rem);
    }

    /* ============================================================
       RESET / BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: var(--night);
      color: var(--cream);
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    img, svg, video { display: block; max-width: 100%; height: auto; }

    a { color: inherit; text-decoration: none; }

    button {
      font: inherit;
      cursor: pointer;
      background: none;
      border: 0;
      color: inherit;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin: 0;
    }

    p { margin: 0; }
    ul, ol { margin: 0; padding: 0; list-style: none; }

    /* ============================================================
       BRAND UTILITIES (locked treatments)
       ============================================================ */
    .gold-gradient {
      background: linear-gradient(135deg, var(--g-f7), var(--g-ed), var(--g-ae));
      -webkit-background-clip: text;
              background-clip: text;
      -webkit-text-fill-color: transparent;
              color: transparent;
    }

    .italic-accent {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--cream-3);
    }

    /* ============================================================
       LAYOUT PRIMITIVES
       ============================================================ */
    .container {
      width: 100%;
      max-width: var(--container);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    main > section { padding-block: clamp(4rem, 10vh, 8rem); }

    /* ============================================================
       ACCESSIBILITY
       ============================================================ */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 2px solid var(--g-d2);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
